<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 200" width="150" height="200">
  <rect width="150" height="200" fill="#f5f0e8" rx="4"/>
  <!-- Passport page background -->
  <rect x="10" y="10" width="130" height="180" rx="3" fill="#f8f4ec" stroke="#c0b8a8" stroke-width="1"/>
  <text x="75" y="28" text-anchor="middle" font-family="serif" font-size="6" fill="#1a3a5c">PASSPORT</text>
  <line x1="15" y1="32" x2="135" y2="32" stroke="#c0b8a8" stroke-width="0.5"/>

  <!-- Photo area with person (cut from passport) -->
  <rect x="20" y="38" width="45" height="55" rx="2" fill="#d0d0d0" stroke="#aaa" stroke-width="1"/>
  <ellipse cx="42" cy="75" rx="12" ry="10" fill="#1a1a1a"/>
  <ellipse cx="42" cy="58" rx="10" ry="12" fill="#1a1a1a"/>
  <ellipse cx="42" cy="48" rx="11" ry="6" fill="#111"/>

  <!-- Passport text lines -->
  <rect x="72" y="42" width="55" height="5" rx="1" fill="#d8d4cc"/>
  <rect x="72" y="52" width="60" height="5" rx="1" fill="#d8d4cc"/>
  <rect x="72" y="62" width="45" height="5" rx="1" fill="#d8d4cc"/>
  <rect x="72" y="72" width="55" height="5" rx="1" fill="#d8d4cc"/>
  <rect x="72" y="82" width="40" height="5" rx="1" fill="#d8d4cc"/>

  <!-- MRZ -->
  <rect x="15" y="155" width="120" height="6" rx="1" fill="#e8e4d8"/>
  <rect x="15" y="165" width="120" height="6" rx="1" fill="#e8e4d8"/>

  <!-- Scissors / cut marks to show it was cropped from passport -->
  <text x="75" y="185" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#999">✂ パスポートから切り取り</text>

  <rect x="2" y="2" width="146" height="196" rx="3" fill="none" stroke="#e74c3c" stroke-width="3"/>
  <circle cx="130" cy="18" r="12" fill="#e74c3c"/>
  <text x="130" y="23" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">✗</text>
</svg>
