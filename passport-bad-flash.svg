<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="200" height="140">
  <defs>
    <radialGradient id="glare1" cx="55%" cy="45%" r="35%">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="streak1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="streak2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="35%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="65%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Passport base -->
  <rect x="5" y="5" width="190" height="130" rx="6" fill="#f5f0e8" stroke="#c0b8a8" stroke-width="1.5"/>
  <text x="100" y="22" text-anchor="middle" font-family="serif" font-size="7" fill="#1a3a5c" font-weight="bold">PASSPORT</text>
  <line x1="15" y1="27" x2="185" y2="27" stroke="#c0b8a8" stroke-width="0.5"/>
  <!-- Photo area -->
  <rect x="15" y="32" width="50" height="60" rx="3" fill="#d0d0d0" stroke="#aaa" stroke-width="1"/>
  <circle cx="40" cy="50" r="12" fill="#bbb"/>
  <ellipse cx="40" cy="75" rx="14" ry="11" fill="#bbb"/>
  <!-- Text lines -->
  <rect x="75" y="36" width="80" height="6" rx="1" fill="#d8d4cc"/>
  <rect x="75" y="48" width="100" height="6" rx="1" fill="#d8d4cc"/>
  <rect x="75" y="60" width="70" height="6" rx="1" fill="#d8d4cc"/>
  <rect x="75" y="72" width="90" height="6" rx="1" fill="#d8d4cc"/>
  <!-- MRZ -->
  <rect x="15" y="100" width="170" height="7" rx="1" fill="#e8e4d8"/>
  <rect x="15" y="110" width="170" height="7" rx="1" fill="#e8e4d8"/>
  <!-- Flash glare - large circular reflection -->
  <ellipse cx="110" cy="65" rx="55" ry="42" fill="url(#glare1)"/>
  <!-- Light streaks / lines -->
  <rect x="60" y="55" width="100" height="18" rx="9" fill="url(#streak1)" transform="rotate(-20, 110, 65)"/>
  <rect x="70" y="50" width="80" height="10" rx="5" fill="url(#streak2)" transform="rotate(15, 110, 55)"/>
  <!-- Small bright spots -->
  <circle cx="105" cy="60" r="8" fill="white" opacity="0.9"/>
  <circle cx="120" cy="68" r="5" fill="white" opacity="0.7"/>
  <circle cx="90" cy="55" r="3" fill="white" opacity="0.6"/>
  <!-- X mark -->
  <circle cx="178" cy="17" r="10" fill="#e74c3c"/>
  <text x="178" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">✗</text>
</svg>
