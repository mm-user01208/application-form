<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 200" width="150" height="200">
  <!-- White background -->
  <rect width="150" height="200" fill="#ffffff" rx="4"/>
  <rect x="1" y="1" width="148" height="198" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>

  <!-- Body / Shoulders (dark suit) -->
  <ellipse cx="75" cy="210" rx="58" ry="45" fill="#2c2c2c"/>
  <!-- Shirt collar -->
  <path d="M55 170 L75 180 L95 170 L95 175 L75 185 L55 175 Z" fill="#f0f0f0"/>
  <!-- Neck -->
  <rect x="63" y="140" width="24" height="32" rx="8" fill="#1a1a1a"/>

  <!-- Head -->
  <ellipse cx="75" cy="110" rx="32" ry="38" fill="#1a1a1a"/>

  <!-- Hair (slightly visible on top) -->
  <ellipse cx="75" cy="78" rx="34" ry="16" fill="#111"/>
  <ellipse cx="75" cy="85" rx="35" ry="12" fill="#1a1a1a"/>

  <!-- Ears -->
  <ellipse cx="42" cy="112" rx="6" ry="10" fill="#1a1a1a"/>
  <ellipse cx="108" cy="112" rx="6" ry="10" fill="#1a1a1a"/>

  <!-- Subtle face features (very minimal, just outlines) -->
  <!-- Eyes area - slight reflection to show it's a face -->
  <ellipse cx="62" cy="106" rx="7" ry="3" fill="#222"/>
  <ellipse cx="88" cy="106" rx="7" ry="3" fill="#222"/>
  <circle cx="62" cy="106" r="1.5" fill="#333"/>
  <circle cx="88" cy="106" r="1.5" fill="#333"/>

  <!-- Nose hint -->
  <line x1="75" y1="108" x2="75" y2="120" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M70 120 Q75 124 80 120" fill="none" stroke="#222" stroke-width="1"/>

  <!-- Mouth hint -->
  <path d="M65 130 Q75 135 85 130" fill="none" stroke="#222" stroke-width="1.2"/>

  <!-- Green border to indicate "good" -->
  <rect x="2" y="2" width="146" height="196" rx="3" fill="none" stroke="#4caf50" stroke-width="3"/>

  <!-- Check mark -->
  <circle cx="130" cy="18" r="12" fill="#4caf50"/>
  <path d="M123 18 L128 23 L137 13" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
