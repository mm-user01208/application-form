<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="200" height="140">
  <defs>
    <clipPath id="cropClip">
      <rect x="0" y="0" width="160" height="120"/>
    </clipPath>
  </defs>
  <rect width="200" height="140" fill="#fde8e8"/>
  <!-- Passport page shifted and cropped -->
  <g clip-path="url(#cropClip)" transform="translate(15, 10)">
    <rect x="0" y="0" width="190" height="130" rx="6" fill="#f5f0e8" stroke="#c0b8a8" stroke-width="1.5"/>
    <text x="95" y="18" text-anchor="middle" font-family="serif" font-size="7" fill="#1a3a5c" font-weight="bold">PASSPORT</text>
    <line x1="10" y1="24" x2="180" y2="24" stroke="#c0b8a8" stroke-width="0.5"/>
    <rect x="12" y="30" width="50" height="60" rx="3" fill="#d0d0d0" stroke="#aaa" stroke-width="1"/>
    <circle cx="37" cy="48" r="12" fill="#bbb"/>
    <ellipse cx="37" cy="73" rx="14" ry="11" fill="#bbb"/>
    <rect x="72" y="34" width="80" height="6" rx="1" fill="#d8d4cc"/>
    <rect x="72" y="46" width="100" height="6" rx="1" fill="#d8d4cc"/>
    <rect x="72" y="58" width="70" height="6" rx="1" fill="#d8d4cc"/>
    <rect x="72" y="70" width="90" height="6" rx="1" fill="#d8d4cc"/>
    <rect x="12" y="98" width="168" height="7" rx="1" fill="#e8e4d8"/>
    <text x="96" y="104" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">P&lt;JPNYAMADA&lt;&lt;TARO&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;</text>
    <rect x="12" y="108" width="168" height="7" rx="1" fill="#e8e4d8"/>
    <text x="96" y="114" text-anchor="middle" font-family="monospace" font-size="5" fill="#888">TH12345671JPN8501011M2601011&lt;&lt;&lt;&lt;</text>
  </g>
  <!-- Right cut indicator -->
  <rect x="160" y="0" width="40" height="140" fill="#fde8e8" opacity="0.85"/>
  <line x1="160" y1="0" x2="160" y2="140" stroke="#e74c3c" stroke-width="2.5" stroke-dasharray="6,4"/>
  <!-- Bottom cut indicator -->
  <rect x="0" y="120" width="200" height="20" fill="#fde8e8" opacity="0.85"/>
  <line x1="0" y1="120" x2="200" y2="120" stroke="#e74c3c" stroke-width="2.5" stroke-dasharray="6,4"/>
  <!-- X mark -->
  <circle cx="178" cy="12" r="10" fill="#e74c3c"/>
  <text x="178" y="17" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">✗</text>
</svg>
