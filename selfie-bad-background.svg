<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 200" width="150" height="200">
  <!-- Busy background (landscape/scenery) -->
  <rect width="150" height="200" fill="#87CEEB"/>
  <!-- Sky gradient -->
  <rect width="150" height="80" fill="#6bb3d9"/>
  <!-- Clouds -->
  <ellipse cx="30" cy="30" rx="25" ry="12" fill="#fff" opacity="0.7"/>
  <ellipse cx="120" cy="25" rx="20" ry="10" fill="#fff" opacity="0.6"/>
  <ellipse cx="80" cy="45" rx="18" ry="8" fill="#fff" opacity="0.5"/>
  <!-- Mountains -->
  <polygon points="0,120 40,60 80,120" fill="#6d8f5e"/>
  <polygon points="60,120 110,50 150,120" fill="#5a7d4e"/>
  <!-- Ground -->
  <rect y="120" width="150" height="80" fill="#7cb342"/>
  <!-- Trees -->
  <rect x="20" y="100" width="6" height="20" fill="#5d4037"/>
  <circle cx="23" cy="95" r="12" fill="#43a047"/>
  <rect x="110" y="105" width="5" height="15" fill="#5d4037"/>
  <circle cx="112" cy="100" r="10" fill="#388e3c"/>

  <!-- Person silhouette -->
  <ellipse cx="75" cy="210" rx="58" ry="45" fill="#2c2c2c"/>
  <path d="M55 170 L75 180 L95 170 L95 175 L75 185 L55 175 Z" fill="#f0f0f0"/>
  <rect x="63" y="140" width="24" height="32" rx="8" fill="#1a1a1a"/>
  <ellipse cx="75" cy="110" rx="32" ry="38" fill="#1a1a1a"/>
  <ellipse cx="75" cy="78" rx="34" ry="16" fill="#111"/>
  <ellipse cx="75" cy="85" rx="35" ry="12" fill="#1a1a1a"/>
  <ellipse cx="42" cy="112" rx="6" ry="10" fill="#1a1a1a"/>
  <ellipse cx="108" cy="112" rx="6" ry="10" fill="#1a1a1a"/>
  <ellipse cx="62" cy="106" rx="7" ry="3" fill="#222"/>
  <ellipse cx="88" cy="106" rx="7" ry="3" fill="#222"/>
  <line x1="75" y1="108" x2="75" y2="120" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M70 120 Q75 124 80 120" fill="none" stroke="#222" stroke-width="1"/>
  <path d="M65 130 Q75 135 85 130" fill="none" stroke="#222" stroke-width="1.2"/>

  <rect x="2" y="2" width="146" height="196" rx="3" fill="none" stroke="#e74c3c" stroke-width="3"/>
  <circle cx="130" cy="18" r="12" fill="#e74c3c"/>
  <text x="130" y="23" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">✗</text>
</svg>
